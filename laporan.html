<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TabunganQ - Laporan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet" />
  <link href="assets/css/style.css" rel="stylesheet" />
</head>
<body class="app-layout bg-light">
  <div class="app-shell d-flex">
    <aside class="sidebar bg-white shadow-sm">
      <div class="sidebar-brand px-4 py-3 border-bottom">
        <h4 class="mb-0 text-primary"><i class="bi bi-wallet2 me-2"></i>TabunganQ</h4>
      </div>
      <nav class="nav flex-column p-3">
        <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
        <a class="nav-link" href="nasabah.html"><i class="bi bi-people me-2"></i>Nasabah</a>
        <a class="nav-link" href="transaksi.html"><i class="bi bi-arrow-up-right-circle me-2"></i>Transaksi</a>
        <a class="nav-link active" href="laporan.html"><i class="bi bi-file-earmark-text me-2"></i>Laporan</a>
        <a class="nav-link" href="profile.html"><i class="bi bi-person-circle me-2"></i>Profile</a>
        <button id="logoutBtn" class="btn btn-outline-danger btn-sm mt-3 w-100"><i class="bi bi-box-arrow-right me-1"></i>Keluar</button>
      </nav>
    </aside>
    <div class="app-content flex-grow-1">
      <header class="topbar d-flex justify-content-between align-items-center px-4 py-3 border-bottom bg-white shadow-sm">
        <div>
          <h5 class="mb-1">Laporan</h5>
          <small class="text-muted">Filter data dan ekspor laporan tabungan.</small>
        </div>
      </header>
      <main class="p-4">
        <div class="card shadow-sm border-0 mb-4">
          <div class="card-body">
            <div class="row g-3 align-items-end">
              <div class="col-sm-5 col-md-4">
                <label class="form-label">Tanggal Mulai</label>
                <input type="date" id="filterStart" class="form-control" />
              </div>
              <div class="col-sm-5 col-md-4">
                <label class="form-label">Tanggal Akhir</label>
                <input type="date" id="filterEnd" class="form-control" />
              </div>
              <div class="col-sm-2 col-md-4 d-grid">
                <button id="filterBtn" class="btn btn-primary">Terapkan</button>
              </div>
            </div>
          </div>
        </div>

        <div class="row g-4 mb-4">
          <div class="col-12 col-md-6 col-xl-3">
            <div class="card shadow-sm border-0 report-card">
              <div class="card-body">
                <small class="text-muted">Total Saldo</small>
                <h4 id="reportSaldo" class="mt-2">Rp0</h4>
              </div>
            </div>
          </div>
          <div class="col-12 col-md-6 col-xl-3">
            <div class="card shadow-sm border-0 report-card">
              <div class="card-body">
                <small class="text-muted">Total Pemasukan</small>
                <h4 id="reportPemasukan" class="mt-2">Rp0</h4>
              </div>
            </div>
          </div>
          <div class="col-12 col-md-6 col-xl-3">
            <div class="card shadow-sm border-0 report-card">
              <div class="card-body">
                <small class="text-muted">Total Penarikan</small>
                <h4 id="reportPenarikan" class="mt-2">Rp0</h4>
              </div>
            </div>
          </div>
          <div class="col-12 col-md-6 col-xl-3">
            <div class="card shadow-sm border-0 report-card">
              <div class="card-body">
                <small class="text-muted">Jumlah Transaksi</small>
                <h4 id="reportCount" class="mt-2">0</h4>
              </div>
            </div>
          </div>
        </div>

        <div class="d-flex flex-column flex-md-row gap-3 mb-4">
          <button id="printReport" class="btn btn-outline-primary"><i class="bi bi-printer me-1"></i>Cetak Laporan</button>
          <button id="exportExcel" class="btn btn-outline-success"><i class="bi bi-file-earmark-spreadsheet me-1"></i>Export Excel</button>
          <button id="backupData" class="btn btn-outline-secondary"><i class="bi bi-download me-1"></i>Backup JSON</button>
          <button id="restoreData" class="btn btn-outline-secondary"><i class="bi bi-upload me-1"></i>Restore JSON</button>
          <button id="resetData" class="btn btn-outline-danger"><i class="bi bi-trash me-1"></i>Reset Semua</button>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h6 class="mb-3">Ringkasan Transaksi</h6>
            <div class="table-responsive">
              <table id="reportTable" class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>No</th>
                    <th>Nasabah</th>
                    <th>Jenis</th>
                    <th>Nominal</th>
                    <th>Saldo Setelah</th>
                    <th>Keterangan</th>
                    <th>Tanggal</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <input type="file" id="restoreInput" accept="application/json" class="d-none" />
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/laporan.js"></script>
</body>
</html>
