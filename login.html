<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TabunganQ - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="assets/css/style.css" rel="stylesheet" />
</head>
<body class="bg-light auth-page">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-5">
        <div class="card shadow-sm border-0 auth-card">
          <div class="card-body p-4">
            <div class="text-center mb-4">
              <div class="brand-icon rounded-circle bg-primary text-white mx-auto mb-3 d-flex align-items-center justify-content-center">
                <i class="bi bi-shield-lock fs-2"></i>
              </div>
              <h2 class="h4 mb-1">Masuk ke TabunganQ</h2>
              <p class="text-muted">Gunakan username dan password Anda.</p>
            </div>
            <form id="loginForm" novalidate>
              <div class="mb-3">
                <label for="loginUsername" class="form-label">Username</label>
                <input type="text" class="form-control form-control-lg" id="loginUsername" placeholder="admin" required />
                <div class="invalid-feedback">Username wajib diisi.</div>
              </div>
              <div class="mb-3">
                <label for="loginPassword" class="form-label">Password</label>
                <input type="password" class="form-control form-control-lg" id="loginPassword" placeholder="admin123" required />
                <div class="invalid-feedback">Password wajib diisi.</div>
              </div>
              <button type="submit" class="btn btn-primary btn-lg w-100">Masuk</button>
            </form>
            <div class="text-center mt-4 small text-muted">
              <p>Default: <strong>admin</strong> / <strong>admin123</strong></p>
              <p>Data tersimpan di Local Storage.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
